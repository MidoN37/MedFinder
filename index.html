<head>
    <meta charset="UTF-8">

    :root {
        --bg: #0a0a0f;
        --surface: rgba(255,255,255,0.05);
        --surface-raised: rgba(255,255,255,0.08);
        --surface-high: rgba(255,255,255,0.12);
        --border: rgba(255,255,255,0.08);
        --border-focus: rgba(99,179,237,0.5);
        --accent: #63b3ed;
        --accent-soft: rgba(99,179,237,0.14);
        --green: #68d391;
        --green-soft: rgba(104,211,145,0.14);
        --text: #f0f4f8;
        --text-2: rgba(240,244,248,0.5);
        --text-3: rgba(240,244,248,0.22);
        --r: 16px;
        --r-sm: 10px;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html { height: 100%; background: var(--bg); }

    body {
        font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100%;
        overscroll-behavior: none;
    }

    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 70% 50% at 15% 5%, rgba(99,179,237,0.07) 0%, transparent 60%),
            radial-gradient(ellipse 50% 60% at 85% 90%, rgba(104,211,145,0.05) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
    }

    .app {
        position: relative;
        z-index: 1;
        max-width: 680px;
        margin: 0 auto;
        padding: 0 16px calc(40px + var(--safe-bottom));
    }

    /* HEADER */
    .header {
        padding: calc(16px + var(--safe-top)) 0 22px;
    }

    .eyebrow {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.11em;
        text-transform: uppercase;
        color: var(--accent);
        opacity: 0.75;
        margin-bottom: 4px;
    }

    .title {
        font-size: clamp(26px, 6.5vw, 34px);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.05;
    }

    .subtitle {
        font-size: 14px;
        color: var(--text-2);
        margin-top: 3px;
        font-weight: 400;
        min-height: 20px;
    }

    /* SEARCH CARD */
    .search-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r);
        overflow: hidden;
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        transition: border-color 0.2s;
        margin-bottom: 0;
    }

    .search-card:focus-within {
        border-color: var(--border-focus);
    }

    .search-main {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 13px 14px;
        background: var(--surface-raised);
    }

    .ico-search {
        flex-shrink: 0;
        color: var(--text-2);
    }

    .search-input {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        font-size: 17px;
        font-family: inherit;
        color: var(--text);
        font-weight: 400;
        min-width: 0;
    }

    .search-input::placeholder { color: var(--text-3); }
    .search-input:disabled { opacity: 0.4; }

    .clear-btn {
        background: var(--surface-high);
        border: none;
        color: var(--text-2);
        width: 20px;
        height: 20px;
        border-radius: 50%;
        cursor: pointer;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        flex-shrink: 0;
        display: none;
        line-height: 1;
    }
    .clear-btn.show { display: flex; }

    /* TOOLBAR */
    .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 11px 2px 0;
    }

    .count-label {
        font-size: 13px;
        color: var(--text-2);
    }

    .fuzzy-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 5px 11px 5px 9px;
        cursor: pointer;
        font-size: 12.5px;
        font-weight: 500;
        color: var(--text-2);
        font-family: inherit;
        transition: all 0.18s;
    }

    .fuzzy-btn svg { width: 13px; height: 13px; fill: currentColor; }

    .fuzzy-btn.on {
        background: var(--accent-soft);
        border-color: rgba(99,179,237,0.28);
        color: var(--accent);
    }

    /* STATUS */
    .status {
        padding: 56px 0 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        text-align: center;
    }

    .status-icon { font-size: 42px; margin-bottom: 4px; line-height: 1; }
    .status-title { font-size: 16px; font-weight: 600; }
    .status-sub { font-size: 14px; color: var(--text-2); max-width: 230px; line-height: 1.5; }

    /* LOADER */
    .loader {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 60px 0;
    }

    .dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--accent);
        animation: blink 1.1s ease-in-out infinite;
        opacity: 0.25;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes blink {
        0%,100% { opacity: 0.18; transform: scale(0.75); }
        50% { opacity: 1; transform: scale(1); }
    }

    /* RESULTS */
    .list {
        margin-top: 12px;
        border-radius: var(--r);
        overflow: hidden;
        border: 1px solid var(--border);
        background: var(--border);
        display: flex;
        flex-direction: column;
        gap: 1px;
    }

    .item {
        background: var(--surface);
        cursor: pointer;
        transition: background 0.1s;
        overflow: hidden;
        animation: up 0.22s ease both;
    }

    @keyframes up {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .item:active { background: var(--surface-raised); }

    .item-row {
        display: flex;
        align-items: center;
        padding: 13px 14px;
        gap: 11px;
    }

    .item-pill {
        width: 34px;
        height: 34px;
        border-radius: 9px;
        background: var(--accent-soft);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 16px;
    }

    .item-text { flex: 1; min-width: 0; }

    .item-name {
        font-size: 14.5px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .item-price {
        font-size: 12.5px;
        color: var(--text-2);
        margin-top: 2px;
    }

    .chevron {
        color: var(--text-3);
        flex-shrink: 0;
        transition: transform 0.24s cubic-bezier(0.34,1.56,0.64,1), color 0.18s;
    }

    .item.open .chevron { transform: rotate(90deg); color: var(--accent); }

    /* DETAIL */
    .detail {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.28s cubic-bezier(0.4,0,0.2,1);
    }

    .detail.open { max-height: 200px; }

    .detail-inner {
        padding: 0 14px 16px 59px;
    }

    .detail-sep {
        height: 1px;
        background: var(--border);
        margin-bottom: 12px;
    }

    .detail-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
    }

    .detail-label { font-size: 13px; color: var(--text-2); }

    .badge {
        font-size: 13px;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 20px;
    }

    .b-blue { background: var(--accent-soft); color: var(--accent); }
    .b-green { background: var(--green-soft); color: var(--green); }

    /* SCROLL BTN */
    #scrollBtn {
        position: fixed;
        bottom: calc(20px + var(--safe-bottom));
        right: 18px;
        width: 42px;
        height: 42px;
        border-radius: 21px;
        background: rgba(30,30,40,0.85);
        border: 1px solid var(--border);
        color: var(--text);
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        z-index: 99;
        transition: transform 0.15s;
    }
    #scrollBtn.show { display: flex; }
    #scrollBtn:active { transform: scale(0.9); }
</style>

<header class="header">
    <div class="eyebrow">Disphat Pharmacie</div>
    <h1 class="title">Médicaments</h1>
    <p class="subtitle" id="sub">Chargement…</p>
</header>

<div class="search-card">
    <div class="search-main">
        <svg class="ico-search" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input class="search-input" id="q" type="search" placeholder="Rechercher un médicament…" autocomplete="off" autocorrect="off" spellcheck="false" disabled>
        <button class="clear-btn" id="clearBtn">✕</button>
    </div>
</div>

<div class="toolbar" id="toolbar" style="display:none">
    <span class="count-label" id="countLabel"></span>
    <button class="fuzzy-btn" id="fuzzyBtn">
        <svg viewBox="0 0 24 24"><path d="M12 2.6l1.4 4.2H18l-3.5 2.6 1.3 4.2-3.5-2.6-3.5 2.6 1.3-4.2L6 6.8h4.6L12 2.6zM22 17l-1-2-1 2-2 1 2 1 1 2 1-2 2-1-2-1zM4 17l-1-2-1 2-2 1 2 1 1 2 1-2 2-1-2-1z"/></svg>
        Fuzzy

```

</div>

<button id="scrollBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"/>
    </svg>
</button>

<script>
(() => {
    let db = [], isFuzzy = false, matches = [], openIdx = null;

    const qEl       = document.getElementById('q');
    const clearBtn  = document.getElementById('clearBtn');
    const toolbar   = document.getElementById('toolbar');
    const fuzzyBtn  = document.getElementById('fuzzyBtn');
    const listEl    = document.getElementById('list');
    const stateArea = document.getElementById('stateArea');
    const countLabel= document.getElementById('countLabel');
    const sub       = document.getElementById('sub');
    const scrollBtn = document.getElementById('scrollBtn');

    // ── LOAD ──
    fetch('disphat_products.csv')
        .then(r => { if (!r.ok) throw r.status; return r.text(); })
        .then(csv => {
            const lines = csv.split(/\r?\n/).filter(l => l.trim());
            db = lines.slice(1).map(line => {
                const cols = [];
                let cur = '', inQ = false;
                for (const ch of line) {
                    if (ch === '"') inQ = !inQ;
                    else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
                    else cur += ch;
                }
                cols.push(cur);
                return {
                    name: (cols[0] || '').replace(/^\uFEFF/, '').trim(),
                    ppv:  (cols[1] || '').trim(),
                    pph:  (cols[2] || '').trim()
                };
            }).filter(r => r.name);

            sub.textContent = `${db.length.toLocaleString('fr-FR')} produits disponibles`;
            qEl.disabled = false;
            qEl.focus();
            idle();
        })
        .catch(err => {
            sub.textContent = 'Erreur de chargement.';
            sub.style.color = '#fc8181';
            stateArea.innerHTML = state('⚠️', 'Erreur de chargement', 'Le fichier disphat_products.csv est introuvable.');
        });

    // ── NORMALIZE ──
    const norm = s => s ? s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'') : '';

    // ── FILTERS ──
    function seqFilter(q, text) {
        const nq = norm(q);
        return norm(text).split(/[\s,.\-\/]+/).some(w => {
            let qi = 0;
            for (let i = 0; i < w.length && qi < nq.length; i++) if (w[i] === nq[qi]) qi++;
            return qi === nq.length;
        });
    }

    function fuzzyFilter(q, text) {
        const nq = norm(q), nt = norm(text);
        let qi = 0, ti = 0;
        while (qi < nq.length && ti < nt.length) { if (nq[qi] === nt[ti]) qi++; ti++; }
        return qi === nq.length;
    }

    // ── SEARCH ──
    function search() {
        const raw = qEl.value;
        clearBtn.classList.toggle('show', raw.length > 0);
        if (!raw.trim()) { idle(); return; }

        const fn = isFuzzy ? fuzzyFilter : seqFilter;
        matches = db.filter(it => fn(raw, it.name)).slice(0, 120);
        openIdx = null;
        render(raw);
    }

    function idle() {
        toolbar.style.display = 'none';
        listEl.style.display  = 'none';
        stateArea.style.display = '';
        stateArea.innerHTML = state('💊', 'Rechercher', 'Tapez le nom d\'un médicament pour commencer');
    }

    function render(q) {
        stateArea.style.display = 'none';
        toolbar.style.display = 'flex';
        countLabel.textContent = matches.length === 0 ? 'Aucun résultat' :
            matches.length === 1 ? '1 résultat' :
            `${matches.length.toLocaleString('fr-FR')} résultats`;

        if (matches.length === 0) {
            listEl.style.display = 'none';
            stateArea.style.display = '';
            stateArea.innerHTML = state('🔍', 'Aucun résultat', `Aucun médicament pour « ${esc(q)} »`);
            return;
        }

        listEl.style.display = 'flex';
        listEl.innerHTML = matches.map((it, i) => `
            <div class="item" data-i="${i}" style="animation-delay:${Math.min(i*0.016,0.28)}s">
                <div class="item-row">
                    <div class="item-pill">💊</div>
                    <div class="item-text">
                        <div class="item-name">${esc(it.name)}</div>
                        <div class="item-price">PPV ${esc(it.ppv)} dhs</div>
                    </div>
                    <svg class="chevron" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
                <div class="detail" id="d${i}">
                    <div class="detail-inner">
                        <div class="detail-sep"></div>
                        <div class="detail-row">
                            <span class="detail-label">Prix Public (PPV)</span>
                            <span class="badge b-blue">${esc(it.ppv)} dhs</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Prix Hôpital (PPH)</span>
                            <span class="badge b-green">${esc(it.pph)} dhs</span>
                        </div>
                    </div>
                </div>
            </div>`).join('');
    }

    // ── TAP DETAIL ──
    listEl.addEventListener('click', e => {
        const item = e.target.closest('.item');
        if (!item) return;
        const i = parseInt(item.dataset.i);
        if (openIdx !== null && openIdx !== i) {
            const prev = listEl.querySelector(`.item[data-i="${openIdx}"]`);
            if (prev) { prev.classList.remove('open'); document.getElementById(`d${openIdx}`).classList.remove('open'); }
        }
        const panel = document.getElementById(`d${i}`);
        const wasOpen = panel.classList.contains('open');
        item.classList.toggle('open', !wasOpen);
        panel.classList.toggle('open', !wasOpen);
        openIdx = wasOpen ? null : i;
    });

    // ── CLEAR ──
    clearBtn.addEventListener('click', () => { qEl.value = ''; qEl.focus(); clearBtn.classList.remove('show'); idle(); });

    // ── FUZZY ──
    fuzzyBtn.addEventListener('click', () => { isFuzzy = !isFuzzy; fuzzyBtn.classList.toggle('on', isFuzzy); search(); });

    qEl.addEventListener('input', search);

    // ── SCROLL ──
    window.addEventListener('scroll', () => scrollBtn.classList.toggle('show', scrollY > 260), { passive: true });
    scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // ── HELPERS ──
    function state(icon, title, sub) {
        return `<div class="status"><div class="status-icon">${icon}</div><div class="status-title">${title}</div><div class="status-sub">${sub}</div></div>`;
    }
    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── SW ──
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js').catch(() => {}));
    }
})();
</script>
